services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: pesu
      POSTGRES_PASSWORD: password
      POSTGRES_DB: pesu_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      target: api
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_USER: pesu
      DB_PASSWORD: password
      DB_NAME: pesu_db
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: supersecret
    depends_on:
      - postgres
      - redis

  worker:
    build:
      context: .
      target: worker
    environment:
      DB_HOST: postgres
      DB_USER: pesu
      DB_PASSWORD: password
      DB_NAME: pesu_db
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock # Access host Docker daemon
    depends_on:
      - postgres
      - redis

volumes:
  postgres_data:
